# Stock Market Circulars Processing Configuration
# Human-editable configuration for the combined pipeline

[general]
# Default processing delays (seconds)
request_delay = 2.0
claude_delay = 3.0
timeout = 60

# Debug and logging
debug = false
log_level = "INFO"  # DEBUG, INFO, WARN, ERROR
log_to_file = true  # Set to false for CI/CD to output to console only
log_to_console = true  # Whether to also output to console (in addition to file)

# Concurrency limits
max_concurrent_items = 5
max_concurrent_sources = 3
max_concurrent_claude_calls = 2
max_concurrent_downloads = 3

[rss_feeds]
# RSS feed URLs for each source
nse = "https://nsearchives.nseindia.com/content/RSS/Circulars.xml"
bse = "https://www.bseindia.com/data/xml/notices.xml"
sebi = "https://www.sebi.gov.in/sebirss.xml"

[processing]
# PDF processing settings
max_pdf_size_mb = 50
min_content_length = 50
max_content_length = 50000
strip_whitespace = true

# Retry settings  
max_retries = 3
retry_delays = [5, 15, 30]  # Custom backoff delays in seconds
backoff_multiplier = 2

# File validation
validate_pdf_signature = true
allowed_file_types = ["pdf"]

[output]
# Hugo content generation
default_year = "2025"  # Where to place content if date parsing fails
max_filename_length = 100
content_encoding = "utf-8"

# Categories mapping
category_mapping = [
    { keywords = ["trading", "trade"], category = "trading" },
    { keywords = ["listing", "list"], category = "listing" },
    { keywords = ["compliance", "regulatory"], category = "compliance" },
    { keywords = ["disclosure", "announce"], category = "disclosure" },
    { keywords = ["surveillance", "monitor"], category = "surveillance" },
    { keywords = ["market", "operation"], category = "market-operations" },
]

[api]
# API configuration (can be overridden by environment variables)
# claude_api_key = ""  # Set via CLAUDE_API_KEY env var
# claude_model = "claude-3-sonnet-20240229"  # Override default model

[directories]
# Directory structure (relative to scripts directory)
content_dir = "../hugo-site/content/circulars"
log_file = "../combined_pipeline.log"

[prompts]
# Claude AI prompts for content generation
claude_analysis = """Generate Hugo content as JSON with separate frontmatter and content sections.

SOURCE: $source | TITLE: $title | URL: $pdf_url | ID: $circular_id

CONTENT:
$content

Output valid JSON only (no explanations, no markdown wrappers):

{
  "frontmatter": {
    "title": "Clear descriptive title",
    "description": "Brief 1-2 sentence summary", 
    "date": "2025-07-25",
    "source": "$source",
    "circular_id": "$circular_id",
    "pdf_url": "$pdf_url",
    "tags": ["relevant-tag-1", "relevant-tag-2"],
    "severity": "high/medium/low",
    "impact": "high/medium/low",
    "category": "trading/listing/compliance/disclosure/market-operations",
    "stocks": ["TICKER1"],
    "importance_ranking": "high/medium/low",
    "impact_ranking": "high/medium/low",
    "justification": "Brief reasoning"
  },
  "content": "## Summary\\n\\n[Summary text]\\n\\n## Key Points\\n\\n- Point 1\\n- Point 2\\n\\n## Regulatory Changes\\n\\n[Changes]\\n\\n## Compliance Requirements\\n\\n[Requirements]\\n\\n## Important Dates\\n\\n[Dates]\\n\\n## Impact Assessment\\n\\n[Impact]"
}

CRITICAL: Output JSON only. No markdown blocks, no explanations, no preamble text.

---
title: "Clear descriptive title"
description: "Brief 1-2 sentence summary"
date: 2025-07-25
source: {source}
circular_id: "{circular_id}"
pdf_url: "{pdf_url}"
tags:
  - relevant-tag-1
  - relevant-tag-2
  - stock-ticker-if-mentioned
severity: "high/medium/low"
impact: "high/medium/low" 
category: "trading/listing/compliance/disclosure/market-operations"
stocks: ["TICKER1", "TICKER2"]
importance_ranking: "high/medium/low"
impact_ranking: "high/medium/low"
justification: "Brief reasoning for rankings"
---

## Summary

[Comprehensive summary]

## Key Points

- Key point 1
- Key point 2

## Regulatory Changes

[Details of regulatory changes if any]

## Compliance Requirements

[What entities need to do]

## Important Dates

[Deadlines and effective dates]

## Impact Assessment

[Market/operational impact analysis]

Extract concrete information from the circular content. Be specific and accurate. Use flat tag structure (no nesting).

Tag guidance:
- Prefer concise, reusable tags over one-off phrases.
- Prefer lowercase hyphenated tags like `rights-issue`, `change-in-symbol`, `settlement-calendar`, `mutual-fund`, `internal-audit-report`.
- These suggested tags are preferred but NOT exclusive. If the circular clearly needs a more precise tag, you may create one.
- Avoid generating near-duplicate variants when one of these fits.

Suggested tag themes and examples:
- Corporate actions: bonus, split, dividend, rights-issue, rights-entitlement, buyback, capital-reduction, open-offer, offer-for-sale, takeover, share-swap, warrant-conversion, partly-paid, call-money, renunciation, issue-opening, letter-of-offer, ccd, ncd, spinoff, delisting, price-adjustment, ex-date, ex-dividend, record-date
- Mergers and restructuring: merger, demerger, amalgamation, scheme-of-arrangement, ibc
- Securities and identification changes: change-in-isin, change-in-name, change-in-symbol, change-in-series, listing-of-equity-shares, same-day-listing, ipo, new-fund-offer
- Surveillance and trading restrictions: asm, gsm, esm, graded-surveillance-measure, suspension-of-trading, trade-for-trade, illiquid-securities, unauthorized-market-practices
- Futures and options: introduction-of-futures-contracts, introduction-of-options-contracts, exclusion-of-futures-and-options-contracts, adjustment-of-futures-and-options-contracts, launch-of-futures-contracts, launch-of-options-contracts, modification-in-the-contract, change-in-expiry, force-closure, freeze-quantity, lot-size-change, partly-paid-equity-shares
- Settlement and operations: settlement-calendar, revised-settlement, settlement-holiday, early-pay-in-of-securities, special-trading, mock-trading, live-activities-schedule, revised-list-of-approved-securities
- Debt and government securities: g-sec, sdl, t-bill, 91-day-t-bill, 182-day-t-bill, 364-day-t-bill, dated-security, auction, primary-market, yield, coupon, maturity, issuance, bidding
- Mutual funds: mutual-fund, fund-house, fund-manager, fund-scheme, amc, nav, sip, systematic-investment, redemption, subscription, switch, allotment, cancellation, folio, units, equity-fund, debt-fund, liquid-fund, hybrid-fund, index-fund, etf, star-mf, mf-platform, mf-trading, mf-settlement, mf-operations, fund-accounting, fund-valuation, fund-pricing, fund-performance, scheme-name, scheme-code, rta, trustee, distributor, investment-adviser, portfolio-manager, investor-grievance, investor-protection
- AMC names when directly relevant: hdfc, icici, sbi, axis, kotak, reliance, aditya-birla, nippon, uti, franklin, dsp, idfc, edelweiss, quantum, mirae, invesco, hsbc, baroda, canara, union, lic, tata, mahindra, sundaram, principal, motilal, iifl, pgim, bandhan, trust
- Margins and collateral: collateral, allocation, segregation, penalty, margins, upstreaming, downstream, running-account, standardised, additional, haircut, margin-collection
- Compliance and audit: internal-audit, internal-audit-report, half-yearly-internal-audit-report, action-taken-report, risk-based-supervision, inspection-and-compliance, display-of-brokerage, statutory-and-regulatory-levies, authorised-persons
- Client onboarding and KYC: kyc, know-your-client, kra, kyc-registration-agency, pan-verification, ucc, unique-client-code, ucc-file-format, ucc-api, uci, unique-client-identifier
- Regulatory circulars: master-circular
- New product launches: product-launch
- Regulatory sources and venues: sebi, rbi, pfrda, bse, nse, bse-star, nse-mf, bse-mf
- Offers and acquisitions: offer-to-buy, acquisition-window, takeover-offer, buyback-offer, opening-of-offer-to-buy, settlement-schedule-offer, settlement-schedule-offer-to-buy
- Bhavcopy and market data: bhavcopy, segment-bhavcopy"""

[github_actions]
# GitHub Actions specific settings
commit_state = true  # Whether to commit state files back to repo
max_errors_before_skip = 50  # Skip deployment if too many errors
preserve_state_on_failure = true  # Always preserve state, even on pipeline failure